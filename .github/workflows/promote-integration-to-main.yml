# Nightly roll-up of the reviewed `integration` trunk onto `main`, which auto-deploys to
# the shared dev environment. See docs/branching.md.
#
# Two triggers, one path:
#   - schedule:        the nightly cadence (the normal "we're ready for dev" promotion)
#   - workflow_dispatch: an off-cycle / hotfix promotion, kicked off manually instead of
#                        waiting for the cron. The fix still went through `integration`
#                        (checks + review + a preview sandbox) first.
#
# The job opens (or reuses) an `integration -> main` PR and enables auto-merge. Branch
# protection on `main` (required status checks) is what actually gates the merge, so the
# roll-up only lands when integration's HEAD is green. Every commit being promoted was
# already reviewed on its own feature PR into integration, so `main` requires checks but
# not a second review -- that is what lets this complete unattended.
#
# Prereqs (one-time): repo setting "Allow auto-merge" enabled; `main` protection set to
# require a PR + the required status checks (0 required reviews).
name: Promote integration -> main

on:
  schedule:
    # Nightly 09:00 UTC = 1am PST / 2am PDT -- overnight Pacific (nobody touching integration),
    # and one hour AFTER the nightly test suite (0 8 UTC) so the promoted HEAD is freshly tested
    # and the two never overlap. GitHub cron is UTC-only (no DST): midnight PST would be 08:00 UTC,
    # which collides with the test suite, so it is shifted to 09:00 UTC. (#680)
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Off-cycle/hotfix promotion context (recorded on the PR)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: promote-integration-to-main
  cancel-in-progress: false

jobs:
  promote:
    # Never run on a fork of this repo.
    #
    # This was `github.repository == 'thorvath-slower/seqtoid-web'`. That string compare is FALSE in the
    # UCSF org (IT-Academic-Research-Services), so the nightly roll-up would NEVER RUN there: nothing
    # would reach main, nothing would build, nothing would deploy -- and it would report as a SKIPPED,
    # GREEN job. Developers would merge to integration and quietly never ship. See platform-overhaul #692.
    #
    # Deliberately a repo VARIABLE, not `!github.event.repository.fork`: GitHub reports
    # IT-ARS/seqtoid-web as isFork=TRUE and thorvath-slower/seqtoid-web as isFork=FALSE, so the fork flag
    # would enable this in the fork and disable it in the real upstream -- exactly backwards.
    # Set TRUNK_ROLLUP_ENABLED=true on the canonical repo only; forks leave it unset.
    if: ${{ vars.TRUNK_ROLLUP_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Is there anything to promote?
        id: diff
        run: |
          set -euo pipefail
          git fetch origin main integration
          ahead=$(git rev-list --count origin/main..origin/integration)
          echo "ahead=$ahead" >> "$GITHUB_OUTPUT"
          if [ "$ahead" -eq 0 ]; then
            echo "integration has nothing ahead of main -- nothing to promote."
          else
            echo "integration is $ahead commit(s) ahead of main."
          fi

      # IT-ARS forbids the default GITHUB_TOKEN from opening PRs ("GitHub Actions is not permitted
      # to create or approve pull requests"), so the roll-up below failed at `gh pr create` and the
      # trunk could never reach main. Mint an App token instead -- the same mechanism
      # gitops-advance-dev.yml already uses to open its gitops PRs (#683). The thorvath fork has no
      # app installed, so this step is skipped there and the token falls back exactly as it does
      # in gitops-advance-dev: GITOPS_TOKEN, then github.token (which works on the fork).
      - name: Generate app token
        id: app_token
        if: ${{ steps.diff.outputs.ahead != '0' && vars.CI_APP_ENABLED == 'true' }}
        uses: chanzuckerberg/github-app-token@365b1f2db827eb8f17288ec335b1a7e3c03ff683 # v1.1.4
        with:
          app_id: ${{ secrets.GH_ACTIONS_HELPER_APP_ID }}
          private_key: ${{ secrets.GH_ACTIONS_HELPER_PK }}

      - name: Open or reuse the promotion PR + enable auto-merge
        if: steps.diff.outputs.ahead != '0'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token || secrets.GITOPS_TOKEN || github.token }}
          REASON: ${{ github.event.inputs.reason }}
          TRIGGER: ${{ github.event_name }}
        run: |
          set -euo pipefail
          stamp=$(date -u +%Y-%m-%d)
          title="Promote integration -> main (${stamp})"
          body="Automated roll-up of the reviewed \`integration\` trunk onto \`main\` (deploys to shared dev)."$'\n'"Trigger: ${TRIGGER}."
          if [ -n "${REASON}" ]; then
            body="${body}"$'\n'"Reason: ${REASON}"
          fi

          existing=$(gh pr list --base main --head integration --state open --json number --jq '.[0].number // empty')
          if [ -z "${existing}" ]; then
            gh pr create --base main --head integration --title "${title}" --body "${body}"
          else
            echo "Reusing open promotion PR #${existing}."
          fi

          # Merge when main's required checks pass; branch protection is the real gate.
          gh pr merge integration --auto --merge --subject "${title}"
