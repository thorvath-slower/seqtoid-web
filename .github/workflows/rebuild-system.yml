name: Rebuild system (DESTRUCTIVE)

# CZID #299 — Path B: destroy + rebuild an environment from scratch (drops the DB,
# recreates/migrates/seeds, AUTO-reloads taxon data, rebuilds OpenSearch indexes,
# rolls services). This is NOT the everyday deploy — use the "Deploy" workflow
# (deploy.yml -> bin/deploy, migrate-only) for normal web-app changes.
#
# Guards (accidental rebuild is intentionally near-impossible):
#   * confirm_destroy must exactly match destination (typed twice);
#   * prod additionally requires prod_approved=yes AND the protected `prod`
#     environment reviewer gate (CZID-81);
#   * bin/rebuild_system re-checks all of this server-side.

on:
  workflow_dispatch:
    inputs:
      destination:
        description: "Environment to REBUILD FROM SCRATCH (dev / staging / sandbox / prod) — DESTROYS its database"
        required: true
      image_tag:
        description: "Image to deploy after rebuild, e.g. sha-abc1234"
        required: true
      confirm_destroy:
        description: "Type the destination env name AGAIN to confirm you intend to DESTROY its data"
        required: true
      prod_approved:
        description: "PROD ONLY: type 'yes' to confirm destroying PRODUCTION data"
        required: false
        default: "no"
      release_notes:
        description: "Reason for the rebuild"
        required: true

env:
  AWS_DEFAULT_OUTPUT: json
  # CZID-83 (CICD-6): region from Actions variables (fallback preserves current behavior when unset).
  AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}

run-name: "⚠️ REBUILD ${{ github.event.inputs.destination }} (DESTRUCTIVE) by ${{ github.actor }}"

jobs:
  guard:
    name: Confirm destructive rebuild
    runs-on: ubuntu-latest
    steps:
      - name: Validate typed confirmation
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "${{ github.event.inputs.destination }}" ]; then
            echo "::error::confirm_destroy ('${{ github.event.inputs.confirm_destroy }}') must exactly match destination ('${{ github.event.inputs.destination }}'). Aborting — nothing changed."
            exit 1
          fi
      - name: Extra gate for production
        if: ${{ github.event.inputs.destination == 'prod' }}
        run: |
          if [ "${{ github.event.inputs.prod_approved }}" != "yes" ]; then
            echo "::error::Rebuilding PROD destroys production data. Set prod_approved=yes (and expect the protected prod-environment reviewer gate). Aborting."
            exit 1
          fi

  rebuild:
    name: Rebuild ${{ github.event.inputs.destination }}
    needs: guard
    runs-on: ubuntu-latest
    # prod's protection rules (required reviewer) gate this job once they exist (CZID-81);
    # dev/staging/sandbox resolve their per-tier environment secrets/vars.
    environment: ${{ github.event.inputs.destination }}
    permissions:
      id-token: write # required for AWS OIDC
      contents: read
    env:
      REBUILD_CONFIRM: ${{ github.event.inputs.destination }}
      REBUILD_PROD_APPROVED: ${{ github.event.inputs.destination == 'prod' && 'yes' || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@0dafeac902942906541bc140009cdbf32665b601 # v1
        with:
          bundler-cache: true
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          # CZID-83 (CICD-6): region from env var; role ARNs from Actions variables (ARNs are
          # identifiers, not secrets). PROD_AWS_ROLE / DEV_AWS_ROLE must be set before running green.
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ github.event.inputs.destination == 'prod' && vars.PROD_AWS_ROLE || vars.DEV_AWS_ROLE }}
          role-session-name: czid-web-${{ github.event.inputs.destination }}-rebuild
      - name: Rebuild system (destroy → rebuild → taxon → OpenSearch → roll)
        run: bin/rebuild_system "${{ github.event.inputs.destination }}" "${{ github.event.inputs.image_tag }}" "${{ github.actor }}"
