name: idseq-web security-scan

# App-appropriate security suite for seqtoid-web (CZID-102):
#  - gitleaks: secret scan, gates NEW secrets introduced by a PR (hard-fail)
#  - trivy (fs): dependency CVE scan, REPORT-ONLY for now (exit-code 0) because
#    known CVEs (axios CZID-45, EOL base images CZID-44) would otherwise block
#    every PR. Ratchet exit-code to '1' once those are cleared (CZID-65 ethos).
#  - brakeman: Rails static security scan, HARD-FAIL gate (CZID-462 / re-enables the
#    stale C14 TODO). Fails on ANY high-confidence (w3) warning and on any NEW
#    medium-confidence (w2) warning: the 23 inherited w2 findings are pinned in
#    config/brakeman.ignore (baseline logged to #294), so only newly-introduced
#    issues break the build. The old blocker ("re-enable after ruby is upgraded")
#    is resolved — Ruby is now 3.3.6 and Brakeman 6.1.2 is in the Gemfile.
# Note: tflint/checkov are IaC tools and don't apply here (no Terraform).
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so gitleaks can scan the PR commit range
      - name: gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # gitleaks-action requires a license key for repos owned by an ORGANIZATION (free for
          # personal namespaces -- which is why the thorvath-slower fork's scan passed without it).
          # The action reads env.GITLEAKS_LICENSE; GitHub does NOT auto-inject secrets as env vars,
          # so it must be mapped explicitly or the org scan fails 'missing gitleaks license'. Empty
          # in a personal namespace is harmless (ignored). See platform-overhaul #692.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          # honors .gitleaks.toml at repo root (dev/test fixture allowlist)

  trivy_fs:
    name: Dependency CVE scan (trivy fs, report-only)
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          format: table
          exit-code: '0' # report-only; ratchet to '1' after CZID-44/45 land

  brakeman:
    name: Rails security scan (brakeman, hard-fail on new)
    runs-on: ubuntu-latest
    container: ruby:3.3.6
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Install brakeman (pinned to Gemfile version)
        # Standalone install (no full bundle) — brakeman is a self-contained static
        # analyzer and doesn't need the app's gems, DB, or built assets to run.
        run: gem install brakeman -v 6.1.2 --no-document
      - name: Brakeman — high-confidence gate (w3, zero tolerance)
        # -z: exit non-zero if ANY warning is reported. Baseline is empty at w3
        # (validated 2026-07-06: 0 warnings, 0 errors), so any new high-confidence
        # finding fails the build.
        run: brakeman --no-pager -w3 -z -q
      - name: Brakeman — medium-confidence gate (w2, fail on NEW only)
        # config/brakeman.ignore pins the 23 inherited medium-confidence findings
        # (CZID-462 / #294). -z + -i means only NEW w2 findings fail the build,
        # ratcheting security forward without forcing a mass-remediation up front.
        run: brakeman --no-pager -w2 -i config/brakeman.ignore -z -q
