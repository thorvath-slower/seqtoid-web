name: Build and Push Docker Images

# CZID #304 — auto-build + push to ECR on merges to `main` ONLY. Feature branches are
# intentionally NOT auto-pushed; build one on demand via the workflow_dispatch below (e.g.
# to test it in a deployed environment). This is a build, not a deploy — deploys stay
# button-driven (deploy.yml / deploy-promote.yml).
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'The environment to which to deploy'
        required: true
        type: string
        default: 'dev'

env:
  AWS_DEFAULT_OUTPUT: json
  AWS_REGION: us-west-2
  DEBIAN_FRONTEND: noninteractive
  # CZID-40 (CICD-6): drive the CI identity from repo/org Actions variables so it is rotatable and
  # not tied to a hardcoded account. Falls back to these defaults if the vars are unset.
  # Default = the DEV account (491013321714) + its dedicated build role. The old default was the
  # idseq-support account (941377154785) — a stale idseq shared-registry holdover; per isolated-envs
  # (D5) the deploy must not touch support, and dev is where the app runs + pulls its image. The role
  # czid-dev-gh-actions-build is provisioned in dev/access-management (cypherid-web-infra).
  CI_ACCOUNT_ID: ${{ vars.CI_ACCOUNT_ID || '491013321714' }}
  GHA_ROLE: ${{ vars.GHA_ROLE || 'czid-dev-gh-actions-build' }}
  LC_ALL: C.UTF-8
  LANG: C.UTF-8
  #GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

#TODO - Added to replace the custom 'cancel-workflow-action' job below.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # cancel_outdated_builds:
  #   runs-on: ubuntu-latest
  #   # This will cancel the whole workflow for non-current pushes on your branch
  #   steps:
  #     - name: Cancel Outdated Builds
  #       uses: styfle/cancel-workflow-action@d07a454dad7609a92316b57b23c9ccfd4f59af66 # 0.13.1
  #       with:
  #         access_token: ${{ github.token }}
  
  build_dev_docker_image:
    runs-on: ubuntu-latest
    permissions: # these permissions must be set for AWS auth to work!
      id-token: write
      contents: read
      packages: write # CZID-392: publish the known-good image to GHCR (source-of-record)
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # CZID-392: full history + tags so bin/compute-version.sh can derive the SemVer
          # (git describe / rev-list against the vX.Y.Z release tags).
          fetch-depth: 0
      - uses: actions/cache@v5
        with:
          path: ~/.cache
          key: ${{runner.os}}-cache
      # buildx (docker-container driver) for bin/build-docker's registry cache export/import.
      # (QEMU removed with the arm64 revert — amd64 builds native, no emulation; #482.)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3
      - name: configure aws credentials
        id: configure_aws_credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          role-to-assume: arn:aws:iam::${{ env.CI_ACCOUNT_ID }}:role/${{ env.GHA_ROLE }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4
        with:
          registry: ${{ env.CI_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/idseq-web
      - name: Export variables
        run: |
          AWS_ACCOUNT_ID=${{ steps.configure_aws_credentials.outputs.aws-account-id }}
          echo "AWS_ACCOUNT_ID=$AWS_ACCOUNT_ID" >> "$GITHUB_ENV"
          # CZID-75: the immutable image ref scanned + signed below. The `sha-` prefix is REQUIRED —
          # bin/build-docker tags the local image `<repo>:sha-<sha8>` (and bin/push-docker pushes that
          # exact tag), so Trivy/cosign/GHCR must reference `sha-<sha8>` or they scan a tag that was
          # never built (fails "MANIFEST_UNKNOWN" / "No such image").
          echo "IMAGE_REF=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/idseq-web:sha-${GITHUB_SHA::8}" >> "$GITHUB_ENV"
      # bin/build-docker builds amd64 and pushes to ECR directly (buildx docker-container driver +
      # registry cache => push, not local --load). #485: SELF-HEALING cache — a `main` build uses
      # CACHE_MODE=write (reads AND writes the cache back, so it auto-recovers after any dep/Dockerfile
      # change); an on-demand feature build (workflow_dispatch off a branch) stays CACHE_MODE=read so
      # it can't pollute the shared main cache. The Sunday weekly-cache-refresh.yml cron does the clean
      # --no-cache rebuild (CACHE_MODE=rebuild) for base-image patches.
      - name: Build and push docker image
        env:
          CACHE_MODE: ${{ github.ref == 'refs/heads/main' && 'write' || 'read' }}
        run: bin/build-docker "$(basename "$GITHUB_REF")" "${GITHUB_SHA::8}"
      # CZID-75: scan the built image BEFORE it ships — fail the release on HIGH/CRITICAL CVEs.
      # The image is already in ECR (build pushed it); Trivy pulls IMAGE_REF (the amd64 child of
      # the manifest list on this amd64 runner) and scans it.
      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_REF }}
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: "true"
          trivyignores: .trivyignore  # accept-current app-dep CVEs (Forgejo #474); NEW ones still fail
      # CZID-392: publish the SAME known-good, scanned MANIFEST LIST to GHCR (source-of-record).
      # #482: `buildx imagetools create` copies the multi-arch manifest list from ECR to GHCR by
      # digest — preserving BOTH arches — without a local image (the old publish-ghcr composite
      # re-stamped SemVer labels via `docker build FROM <local single-arch image>`, which cannot
      # operate on a manifest list; the SemVer/provenance label re-stamp is deferred — see PR notes).
      - name: Log in to GHCR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish manifest list to GHCR
        env:
          PUSH_LATEST: ${{ github.ref == 'refs/heads/main' }}
        run: |
          # GHCR (like Docker registries generally) requires a LOWERCASE repository name.
          # github.repository_owner is the org verbatim: 'IT-Academic-Research-Services' has capitals,
          # which GHCR rejects ("invalid reference format: ... must be lowercase"). The fork owner
          # (thorvath-slower) is already lowercase, so this never surfaced there. Lowercase the built-in
          # $GITHUB_REPOSITORY_OWNER in-shell (Actions has no lowercase expression function). See #692.
          GHCR_REPO="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/seqtoid-web"
          SHA_TAG="sha-${GITHUB_SHA::8}"
          docker buildx imagetools create -t "${GHCR_REPO}:${SHA_TAG}" "${IMAGE_REF}"
          if [ "$PUSH_LATEST" = "true" ]; then
            docker buildx imagetools create -t "${GHCR_REPO}:latest" "${IMAGE_REF}"
          fi
      # CZID-75: sign the pushed image so the deploy side can enforce "signed images only" (#77).
      # Keyless (Sigstore/Fulcio, via the GHA OIDC token). #482: resolve the ECR manifest-list digest
      # via buildx imagetools (no local image) and sign with --recursive so BOTH arch children +
      # the index are signed.
      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: Sign image (cosign, keyless)
        env:
          COSIGN_YES: "true"
        run: |
          DIGEST="$(docker buildx imagetools inspect --format '{{ json .Manifest.Digest }}' "${IMAGE_REF}" | tr -d '"')"
          cosign sign --recursive "${IMAGE_REF%:*}@${DIGEST}"

