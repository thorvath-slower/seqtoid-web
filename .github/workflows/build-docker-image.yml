name: Build and Push Docker Images

#TODO - This should not push images to ECR on every branch push. Only main should be automatically pushed to ECR.
# If feature branches need to be tested in a deployed environment, a separate workflow_dispatch should be run for those.
on:
#  push:
#    branches:
#      - "**"
#    tags-ignore:
#      - "**"
  workflow_dispatch:
    inputs:
      environment:
        description: 'The environment to which to deploy'
        required: true
        type: string
        default: 'dev'

env:
  AWS_DEFAULT_OUTPUT: json
  AWS_REGION: us-west-2
  DEBIAN_FRONTEND: noninteractive
  LC_ALL: C.UTF-8
  LANG: C.UTF-8
  #GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

#TODO - Added to replace the custom 'cancel-workflow-action' job below.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # cancel_outdated_builds:
  #   runs-on: ubuntu-latest
  #   # This will cancel the whole workflow for non-current pushes on your branch
  #   steps:
  #     - name: Cancel Outdated Builds
  #       uses: styfle/cancel-workflow-action@0.8.0
  #       with:
  #         access_token: ${{ github.token }}
  
  build_dev_docker_image:
    runs-on: ubuntu-latest
    permissions: # these permissions must be set for AWS auth to work!
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.cache
          key: ${{runner.os}}-cache
      - name: configure aws credentials
        id: configure_aws_credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::941377154785:role/gha-seqtoid
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        uses: docker/login-action@v3
        with:
          registry: 941377154785.dkr.ecr.us-west-2.amazonaws.com/idseq-web
      - name: Export variables
        run: |
          AWS_ACCOUNT_ID=${{ steps.configure_aws_credentials.outputs.aws-account-id }}
          echo "AWS_ACCOUNT_ID=$AWS_ACCOUNT_ID" >> $GITHUB_ENV
      - name: Build docker image
        run: bin/build-docker $(basename $GITHUB_REF) ${GITHUB_SHA::8}
      - name: Push docker image
        run: bin/push-docker $(basename $GITHUB_REF) ${GITHUB_SHA::8}

