name: Nightly test suite (rspec + jest)

# CZID-462 (#498) — the scheduled-cadence half of the comprehensive test effort.
# Runs the full non-deployed suites (Ruby/MySQL8 rspec + JS/TS jest) every night,
# independent of PR traffic, so a regression that lands without a fresh PR run
# (or from a dependency/base-image drift) is caught within 24h.
#
# What runs here:
#   - rspec (MySQL 8)  — same bin/ci-test SSOT script as the PR gate (ci-test-mysql8.yml),
#                        so nightly can't drift from PR. SimpleCov (.simplecov) writes
#                        coverage/.last_run.json (line + branch %).
#   - jest (JS/TS)     — the client unit/component suite with coverage. jest.config.js
#                        writes client-coverage/coverage-summary.json (lines/branches/
#                        functions/statements %).
#
# Coverage tracking (the point of #498): each suite's coverage % is extracted into the
# job summary and uploaded as an artifact, and the aggregate `report` job tabulates both
# so the 90/90 coverage goal (CZID-462) can be tracked on a nightly cadence.
#
# CAVEAT — the Jest number is a biased slice: jest.config.js has NO `collectCoverageFrom`,
# so only files a test imports are counted (untested modules are invisible, inflating the
# %). Fixing that is a separate config ticket; until it lands, read the nightly JS number
# as a floor, not the true repo-wide %. The RSpec number (SimpleCov 'rails' profile) is
# whole-app.
#
# NOT yet wired here (tracked separately, HELD on env access):
#   - Playwright e2e smoke  -> #500 (needs deployed staging secrets; lives in
#                              scheduled-automated-tests.yml / e2e-automation.yml).
#   - Reporting + alerting  -> #502 (structured pass/fail summary + notify-on-red).
#     The `report` job below is the seam where that plugs in.

on:
  schedule:
    # 08:00 UTC = 01:00 PDT / 00:00 PST — nightly, off-peak. crontab.guru for syntax.
    - cron: '0 8 * * *'
  workflow_dispatch:
  # Reusable so the nightly-full-regime.yml orchestrator (#734) can fan out to this same
  # suite as its unit+coverage leg instead of duplicating the rspec/jest job definitions.
  workflow_call:

permissions:
  contents: read

concurrency:
  group: nightly-test-suite
  cancel-in-progress: true

jobs:
  rspec_mysql8:
    name: RSpec (MySQL 8)
    runs-on: ubuntu-latest
    container: ruby:3.3.6
    outputs:
      line: ${{ steps.coverage.outputs.line }}
      branch: ${{ steps.coverage.outputs.branch }}
    env:
      AUTH_TOKEN_SECRET: 'GYbvZ9/uHy75wWWK4BO3jZGJ0noacv7GbTJI96wZgWQ=' # dummy — test only
      DB_USERNAME: root
      DB_PASSWORD: ''
      DB_HOST: db
      RAILS_ENV: test
      AWS_REGION: us-west-2
      AWS_ACCOUNT_ID: test
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    services:
      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      db:
        image: bitnamilegacy/mysql:8.0
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        env:
          ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: idseq_test
          MYSQL_AUTHENTICATION_PLUGIN: mysql_native_password
          MYSQL_EXTRA_FLAGS: "--character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --group_concat_max_len=1073741824"
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Determine Kernel Version
        run: echo "KERNEL_VERSION=$(uname -r)" >> "$GITHUB_ENV"
      - name: Cache Ruby Dependencies
        uses: actions/cache@v5
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-${{ env.KERNEL_VERSION }}-gems-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.KERNEL_VERSION }}-gems
      - name: Run CI test suite (bin/ci-test SSOT)
        shell: bash
        run: |
          set -o pipefail
          bash bin/ci-test 2>&1 | tee "$RUNNER_TEMP/suite.log"

      - name: Extract RSpec coverage (SimpleCov)
        id: coverage
        # Always run so a failing suite still surfaces whatever coverage was recorded.
        # SimpleCov (.simplecov, 'rails' profile) writes coverage/.last_run.json:
        #   {"result": {"line": <pct>, "branch": <pct>}}
        if: ${{ always() }}
        shell: bash
        run: |
          f=coverage/.last_run.json
          if [ ! -f "$f" ]; then
            echo "No $f (suite may have failed before writing coverage)."
            {
              echo "line=n/a"
              echo "branch=n/a"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # ruby is present (this is the ruby:3.3.6 container) — parse without jq.
          line=$(ruby -rjson -e 'puts JSON.parse(File.read("coverage/.last_run.json"))["result"]["line"]')
          branch=$(ruby -rjson -e 'r=JSON.parse(File.read("coverage/.last_run.json"))["result"]; puts r.fetch("branch","n/a")')
          {
            echo "line=$line"
            echo "branch=$branch"
          } >> "$GITHUB_OUTPUT"
          {
            echo "### RSpec coverage (SimpleCov, whole-app)"
            echo ""
            echo "| Metric | Coverage % |"
            echo "| --- | --- |"
            echo "| Line | $line |"
            echo "| Branch | $branch |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload RSpec coverage report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rspec-coverage
          path: coverage/
          if-no-files-found: warn

  jest:
    name: Jest (JS/TS)
    runs-on: ubuntu-latest
    outputs:
      lines: ${{ steps.coverage.outputs.lines }}
      statements: ${{ steps.coverage.outputs.statements }}
      branches: ${{ steps.coverage.outputs.branches }}
      functions: ${{ steps.coverage.outputs.functions }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: "./.node-version"
      - name: Cache Node Dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Switch git to use HTTP
        run: >
          git config --global url."https://github.com/".insteadOf
          ssh://git@github.com/
      - name: Pin npm (matches Dockerfile / engines)
        run: npm install -g npm@11.16.0
      - name: Install Dependencies
        run: npm ci
      - name: Jest (with coverage)
        # Append json-summary on the CLI (jest.config.js only sets text-summary/json/html)
        # so we get client-coverage/coverage-summary.json with the {total:{...pct}} totals.
        # NOTE: config has no collectCoverageFrom, so this % counts only test-imported files
        # (a floor, not the repo-wide %). Config fix is a separate ticket.
        run: npx jest --coverage --ci --coverageReporters=text-summary --coverageReporters=json --coverageReporters=html --coverageReporters=json-summary
        env:
          CI: true

      - name: Extract Jest coverage
        id: coverage
        # Always run: even when a threshold trips (nonzero exit) we still want the number.
        if: ${{ always() }}
        run: |
          f=client-coverage/coverage-summary.json
          if [ ! -f "$f" ]; then
            echo "No $f (jest may have failed before writing coverage)."
            {
              echo "lines=n/a"
              echo "statements=n/a"
              echo "branches=n/a"
              echo "functions=n/a"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          lines=$(node -p "require('./$f').total.lines.pct")
          statements=$(node -p "require('./$f').total.statements.pct")
          branches=$(node -p "require('./$f').total.branches.pct")
          functions=$(node -p "require('./$f').total.functions.pct")
          {
            echo "lines=$lines"
            echo "statements=$statements"
            echo "branches=$branches"
            echo "functions=$functions"
          } >> "$GITHUB_OUTPUT"
          {
            echo "### Jest coverage (test-imported files only — see caveat)"
            echo ""
            echo "| Metric | Coverage % |"
            echo "| --- | --- |"
            echo "| Lines | $lines |"
            echo "| Statements | $statements |"
            echo "| Branches | $branches |"
            echo "| Functions | $functions |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Jest coverage report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: jest-coverage
          path: client-coverage/
          if-no-files-found: warn

  report:
    name: Nightly result summary
    # Runs regardless of suite outcome so a red suite still produces a summary.
    if: ${{ always() }}
    needs: [rspec_mysql8, jest]
    runs-on: ubuntu-latest
    steps:
      - name: Summarize
        env:
          RSPEC: ${{ needs.rspec_mysql8.result }}
          JEST: ${{ needs.jest.result }}
          RSPEC_LINE: ${{ needs.rspec_mysql8.outputs.line }}
          RSPEC_BRANCH: ${{ needs.rspec_mysql8.outputs.branch }}
          JEST_LINES: ${{ needs.jest.outputs.lines }}
          JEST_STATEMENTS: ${{ needs.jest.outputs.statements }}
          JEST_BRANCHES: ${{ needs.jest.outputs.branches }}
          JEST_FUNCTIONS: ${{ needs.jest.outputs.functions }}
        run: |
          {
            echo "# Nightly test suite"
            echo ""
            echo "| Suite | Result |"
            echo "| --- | --- |"
            echo "| RSpec (MySQL 8) | $RSPEC |"
            echo "| Jest (JS/TS) | $JEST |"
            echo ""
            echo "## Coverage (tracking the 90/90 goal — CZID-462)"
            echo ""
            echo "| Suite | Line/Statement % | Branch % | Function % |"
            echo "| --- | --- | --- | --- |"
            echo "| RSpec (whole-app) | ${RSPEC_LINE:-n/a} | ${RSPEC_BRANCH:-n/a} | — |"
            echo "| Jest (test-imported files only*) | ${JEST_STATEMENTS:-n/a} | ${JEST_BRANCHES:-n/a} | ${JEST_FUNCTIONS:-n/a} |"
            echo ""
            echo "\\* Jest coverage counts only files a test imports (jest.config.js has no"
            echo "\`collectCoverageFrom\`), so it is a floor, not the repo-wide %. Config fix"
            echo "is tracked separately. RSpec is whole-app (SimpleCov 'rails' profile)."
            echo ""
            echo "Full HTML reports are attached as the \`rspec-coverage\` / \`jest-coverage\` artifacts."
          } >> "$GITHUB_STEP_SUMMARY"
          # TODO(#502): emit structured report + alert-on-red (Slack/PagerDuty) here.
          # TODO(#500): add Playwright e2e smoke to `needs` once staging secrets land.
          if [ "$RSPEC" != "success" ] || [ "$JEST" != "success" ]; then
            echo "Nightly suite RED (rspec=$RSPEC jest=$JEST)"
            exit 1
          fi
          echo "Nightly suite GREEN"
