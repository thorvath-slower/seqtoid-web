name: deploy — promote (dev -> staging -> prod)
run-name: Promote ${{ inputs.source }} dev -> staging -> prod by ${{ github.actor }}

# Promotion-gated deploy for seqtoid-web (CZID-101): a change can only reach the
# prod cluster after it deploys successfully to dev AND staging AND the staging
# smoke tests pass. Each tier `needs:` the previous, so prod is unreachable unless
# dev + staging deployed green and staging smoke passed — no direct-to-prod deploy.
# The app-side mirror of the IaC promote.yml (CZID-96).
#
# PROD APPROVAL GATE: the second, human gate (required-reviewer approval) is added
# by giving reusable-deploy-workflow.yml's prod job `environment: prod` once the
# GitHub Environments + protection rules exist (CZID-81); plan/deploy role split
# is CZID-26. A real run also needs AWS OIDC + GH_DEPLOY_TOKEN + cluster access
# (not on the fork) — the ordering enforcement here holds regardless.

on:
  workflow_dispatch:
    inputs:
      source:
        description: Source ref to promote (branch/tag/sha).
        required: true
        type: string
      deployment_reason:
        description: Reason (scheduled, hotfix, issue ID, …).
        required: true
        type: string
      confirm:
        description: Type "promote" to confirm a full dev -> staging -> prod promotion.
        required: true
        type: string
        default: ""

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-promote-${{ github.ref }}
  cancel-in-progress: false

jobs:
  guard:
    name: Confirm promotion
    runs-on: ubuntu-latest
    steps:
      - name: Require explicit confirmation
        run: |
          if [[ "${{ inputs.confirm }}" != "promote" ]]; then
            echo "::error::Type 'promote' in the confirm input to run a full dev -> staging -> prod promotion."
            exit 1
          fi

  deploy-dev:
    name: Deploy dev
    needs: guard
    uses: ./.github/workflows/reusable-deploy-workflow.yml
    with:
      source: ${{ inputs.source }}
      destination: dev
      developer_name: ${{ github.actor }}
      deployment_reason: ${{ inputs.deployment_reason }}
    secrets: inherit

  deploy-staging:
    name: Deploy staging (gated on dev)
    needs: deploy-dev
    uses: ./.github/workflows/reusable-deploy-workflow.yml
    with:
      source: ${{ inputs.source }}
      destination: staging
      developer_name: ${{ github.actor }}
      deployment_reason: ${{ inputs.deployment_reason }}
    secrets: inherit

  verify-staging:
    name: Verify staging (smoke) — gates prod
    needs: deploy-staging
    # Mirror deploy.yml's post-staging verification: run the Playwright smoke suite
    # against staging before prod is reachable. Smoke (not full e2e) is the prod gate
    # here — it's the fast, stable signal; gating prod on flakier e2e would block
    # legitimate promotions. (Run full e2e via deploy.yml against staging if needed.)
    uses: ./.github/workflows/e2e-automation.yml
    with:
      node-environment: "staging"
      test-category: "smoke"
      should-run-with-feature-flags: false
    secrets: inherit

  deploy-prod:
    name: Deploy prod (gated on staging + smoke)
    needs: verify-staging
    uses: ./.github/workflows/reusable-deploy-workflow.yml
    with:
      source: ${{ inputs.source }}
      destination: prod
      developer_name: ${{ github.actor }}
      deployment_reason: ${{ inputs.deployment_reason }}
    secrets: inherit
