name: ci-test (postgres)

# PR test gate for seqtoid-web running the Rails suite against PostgreSQL — incl.
# the MySQL->Postgres parity specs (improvement-#005). This is the gate that
# validates the migration: it boots the app on a Postgres service, loads the
# Postgres schema (citext etc.), and runs the suite. Self-contained — dummy AWS
# creds + service containers — so it runs in the fork with no cloud access.
#
# NOTE (CZID-101): triggers include this branch's name so the gate runs now while
# the pipeline is being built; scope `push` to [main] once it lands.

on:
  pull_request:
  push: {}   # all branches while building the pipeline; scope to [main] once landed
  workflow_dispatch:

# Collapse the duplicate push + pull_request runs for the same commit: both events
# resolve to the same head SHA, so the later one cancels the earlier in-progress run
# instead of running the full suite twice. (CZID-101 CI hygiene.)
concurrency:
  group: ci-test-postgres-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  ruby_test_postgres:
    name: Ruby Test (PostgreSQL)
    runs-on: ubuntu-latest
    container: ruby:3.3.6
    env:
      # Dummy secret — test only.
      AUTH_TOKEN_SECRET: 'GYbvZ9/uHy75wWWK4BO3jZGJ0noacv7GbTJI96wZgWQ='
      DB_USERNAME: test_user
      DB_PASSWORD: test_password
      DB_HOST: postgres
      RAILS_ENV: test
      AWS_REGION: us-west-2
      AWS_ACCOUNT_ID: test
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    services:
      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: idseq_test
        options: >-
          --health-cmd "pg_isready -U test_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Determine Kernel Version
        run: echo "KERNEL_VERSION=`uname -r`" >> $GITHUB_ENV
      - name: Cache Ruby Dependencies
        uses: actions/cache@v5
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-${{ env.KERNEL_VERSION }}-gems-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.KERNEL_VERSION }}-gems
      - name: Run CI test suite
        # SINGLE SOURCE OF TRUTH: bin/ci-test (deps + schema load + rspec) is the
        # exact same script the local harness runs (bin/ci-local). Local and CI
        # can't drift. (CZID-109.)
        run: bash bin/ci-test
