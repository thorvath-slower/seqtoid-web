name: Weekly Build-Cache Refresh

# Forgejo #485 — the FRESHNESS half of the build-cache lifecycle.
#
# WARMTH is handled by self-healing: every `main` build (build-docker-image.yml) runs CACHE_MODE=write,
# so it reads AND writes the ECR `<repo>:buildcache` ref — the cache auto-recovers after any dep or
# Dockerfile change with no cold-cache window. This Sunday cron does the separate FRESHNESS pass
# (CACHE_MODE=rebuild): a clean `--no-cache` from-scratch rebuild that
#   1. re-pulls the base image + runs `apt-get upgrade`, so the cache picks up the week's base-image
#      security patches + current dependency drift, and
#   2. writes the fresh `mode=max` cache back.
# Self-heal keeps the cache WARM; this keeps it CURRENT. Neither replaces the other.
#
# Store: ECR (the same registry EKS pulls from) — no separate cache backend to manage.

on:
  schedule:
    # 07:00 UTC every Sunday (cron field order: minute hour day-of-month month day-of-week; 0 = Sun).
    - cron: '0 7 * * 0'
  # Manual trigger to force an out-of-band cache refresh (e.g. after a big dependency bump).
  workflow_dispatch: {}

env:
  AWS_DEFAULT_OUTPUT: json
  # CZID-83 (CICD-6): region from Actions variables (fallback preserves current behavior when unset).
  AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}
  DEBIAN_FRONTEND: noninteractive
  # Same rotatable CI identity as build-docker-image.yml (CZID-40 / dev account default).
  CI_ACCOUNT_ID: ${{ vars.CI_ACCOUNT_ID || '491013321714' }}
  GHA_ROLE: ${{ vars.GHA_ROLE || 'czid-dev-gh-actions-build' }}
  # CZID-83 (CICD-6): ECR repo name parameterized; fallback = the LIVE dev repo 'idseq-web' (rebrand
  # on hold -- no rename). Must match build-docker-image.yml's cache target. See the note there +
  # TICKET-83-VAR-SET-COMMANDS.md before setting vars.ECR_REPO_NAME at repo level.
  ECR_REPO_NAME: ${{ vars.ECR_REPO_NAME || 'idseq-web' }}
  LC_ALL: C.UTF-8
  LANG: C.UTF-8

# Never overlap two refreshes (a manual dispatch during the cron window, etc.).
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  refresh_build_cache:
    runs-on: ubuntu-latest
    permissions: # must be set for AWS OIDC auth
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # buildx for bin/build-docker's registry cache. (QEMU removed with the arm64 revert —
      # the refreshed cache is amd64-only until arm64 is redone on native runners; #482.)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3
      - name: configure aws credentials
        id: configure_aws_credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          role-to-assume: arn:aws:iam::${{ env.CI_ACCOUNT_ID }}:role/${{ env.GHA_ROLE }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4
        with:
          registry: ${{ env.CI_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO_NAME }}
      - name: Export variables
        run: |
          AWS_ACCOUNT_ID=${{ steps.configure_aws_credentials.outputs.aws-account-id }}
          echo "AWS_ACCOUNT_ID=$AWS_ACCOUNT_ID" >> "$GITHUB_ENV"
      # #485: the weekly FRESHNESS pass — CACHE_MODE=rebuild does a clean `--no-cache` rebuild
      # (re-pulls base image + apt upgrade) and writes `--cache-to mode=max`, so the self-healing
      # main cache is rebased onto the week's security patches.
      - name: Refresh build cache (clean --no-cache rebuild, cache-to mode=max)
        env:
          CACHE_MODE: rebuild
        run: bin/build-docker main "${GITHUB_SHA::8}"
