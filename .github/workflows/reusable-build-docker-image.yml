name: Reusable Build and Push Docker Images

on:
  workflow_call:

env:
  AWS_DEFAULT_OUTPUT: json
  # CZID-83 (CICD-6): region from Actions variables (fallback preserves current behavior when unset).
  AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}
  DEBIAN_FRONTEND: noninteractive
  LC_ALL: C.UTF-8
  LANG: C.UTF-8
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

jobs:
  cancel_outdated_builds:
    runs-on: ubuntu-latest
    # This will cancel the whole workflow for non-current pushes on your branch
    steps:
      - name: Cancel Outdated Builds
        uses: styfle/cancel-workflow-action@d07a454dad7609a92316b57b23c9ccfd4f59af66 # 0.13.1
        with:
          access_token: ${{ github.token }}
  
  build_dev_docker_image:
    runs-on: ubuntu-latest
    permissions: # these permissions must be set for AWS auth to work!
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: ~/.cache
          key: ${{runner.os}}-cache
      # buildx (docker-container driver) for bin/build-docker's registry cache. (QEMU removed
      # with the arm64 revert — amd64 builds native; #482.)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3
      - name: Configure AWS Credentials
        id: configure_aws_credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          # CZID-83 (CICD-6): region + role ARN + ECR host from Actions variables. DEV_AWS_ROLE is
          # an ARN and DEV_ECR_REPO is a registry host -- identifiers, not secrets -- so they move
          # from secrets.* to vars.*. The vars must be set before this workflow can run green.
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.DEV_AWS_ROLE }}
          role-session-name: build-push-docker-img
      - name: Login to ECR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4
        with:
          registry: ${{ vars.DEV_ECR_REPO }}
      - name: Export variables
        run: |
          AWS_ACCOUNT_ID=${{ steps.configure_aws_credentials.outputs.aws-account-id }}
          echo "AWS_ACCOUNT_ID=$AWS_ACCOUNT_ID" >> "$GITHUB_ENV"
      # bin/build-docker builds amd64 and pushes to ECR directly (buildx). #485: CACHE_MODE=read —
      # this reusable path is a cache CONSUMER (build-docker-image.yml on main is the single
      # self-healing writer), so it reads the shared cache but never writes it.
      - name: Build and push docker image
        env:
          CACHE_MODE: read
        run: bin/build-docker "$(basename "$GITHUB_REF")" "${GITHUB_SHA::8}"

  build_prod_docker_image:
    runs-on: ubuntu-latest
    permissions: # these permissions must be set for AWS auth to work!
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: ~/.cache
          key: ${{runner.os}}-cache
      - name: Configure AWS Credentials
        id: configure_aws_credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          # CZID-83 (CICD-6): region + role ARN + ECR host from Actions variables (identifiers, not
          # secrets). PROD_AWS_ROLE / PROD_ECR_REPO must be set before this workflow can run green.
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.PROD_AWS_ROLE }}
          role-session-name: build-push-docker-img
      - name: Login to ECR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4
        with:
          registry: ${{ vars.PROD_ECR_REPO }}
      - name: Export variables
        run: |
          AWS_ACCOUNT_ID=${{ steps.configure_aws_credentials.outputs.aws-account-id }}
          echo "AWS_ACCOUNT_ID=$AWS_ACCOUNT_ID" >> "$GITHUB_ENV"
      - name: Build docker image
        run: bin/build-docker "$(basename "$GITHUB_REF")" "${GITHUB_SHA::8}"
      - name: Push docker image
        run: bin/push-docker "$(basename "$GITHUB_REF")" "${GITHUB_SHA::8}"
