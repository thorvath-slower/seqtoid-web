{{- if .Values.serviceAccount.create -}}
# App IRSA identity — the pod role from deploy/terraform/irsa-node-backend-dev.tf
# (output node_backend_role_arn). Grants SSM (config), Secrets Manager (signing
# key + DB password), S3, SFN, SQS, STS, and (Phase 2, taxon indexing Option A)
# lambda:InvokeFunction. NOT the Rails ECS task role (that's an ECS-task role and
# can't be reused). Wired per-env from the infra repo.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "seqtoid-node-backend.serviceAccountName" . }}
  labels:
    {{- include "seqtoid-node-backend.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.roleArn }}
  annotations:
    eks.amazonaws.com/role-arn: {{ . | quote }}
  {{- end }}
{{- end }}
