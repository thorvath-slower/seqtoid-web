{{- if .Values.ingress.enabled -}}
# Strangler edge via the AWS Load Balancer Controller (ALB), routed to the ACTIVE
# service so a blueGreen promotion swaps traffic atomically. This is a SEPARATE
# hostname from the Rails ingress — the Node backend runs alongside Rails and
# takes only the traffic you point at this host. In dev the seam is `internal`
# (scheme: internal); it becomes internet-facing only at the full-cutover step
# (#457), controlled by ingress.scheme per-env.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "seqtoid-node-backend.fullname" . }}
  labels:
    {{- include "seqtoid-node-backend.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: {{ .Values.ingress.scheme | quote }}
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: {{ .Values.ingress.healthCheckPath | quote }}
    {{- if eq .Values.ingress.scheme "internet-facing" }}
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    {{- end }}
    {{- with .Values.ingress.certificateArn }}
    alb.ingress.kubernetes.io/certificate-arn: {{ . | quote }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "seqtoid-node-backend.fullname" . }}-active
                port:
                  number: {{ .Values.service.port }}
{{- end }}
