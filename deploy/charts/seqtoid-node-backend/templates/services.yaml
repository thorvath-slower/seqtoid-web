# Active + preview Services for the blueGreen Rollout. Argo Rollouts manages the
# pod-template-hash selector on each; we only supply the stable base selector.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "seqtoid-node-backend.fullname" . }}-active
  labels:
    {{- include "seqtoid-node-backend.labels" . | nindent 4 }}
    seqtoid.io/rollout-role: active
spec:
  type: ClusterIP
  selector:
    {{- include "seqtoid-node-backend.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "seqtoid-node-backend.fullname" . }}-preview
  labels:
    {{- include "seqtoid-node-backend.labels" . | nindent 4 }}
    seqtoid.io/rollout-role: preview
spec:
  type: ClusterIP
  selector:
    {{- include "seqtoid-node-backend.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
