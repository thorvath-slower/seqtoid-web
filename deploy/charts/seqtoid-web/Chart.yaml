apiVersion: v2
name: seqtoid-web
description: >-
  seqtoid-web on EKS via Argo CD + Argo Rollouts. Ships the web workload as a
  blueGreen Rollout (active/preview Services), the resque + shoryuken workers as
  Deployments, a pre-sync db:migrate Job, and a smoke AnalysisTemplate gating
  promotion. Replaces the czecs/ECS task-definition path.
type: application
# Chart version tracks the chart's own shape; appVersion is set per-deploy via image.tag.
version: 0.1.0
appVersion: "latest"
maintainers:
  - name: Thomas Horvath
keywords:
  - seqtoid
  - rails
  - argo-rollouts
  - blue-green
