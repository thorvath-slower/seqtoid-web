# Worker Deployments — the resque family (workers/scheduler/pipeline-monitor/
# result-monitor) + shoryuken. Each replaces one czecs worker service. `args` go
# to the image ENTRYPOINT, which wraps them in `chamber exec ... bundle exec`.
{{- $root := . -}}
{{- range $name, $w := .Values.workers }}
{{- if ne $w.enabled false }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "seqtoid-web.fullname" $root }}-{{ $name }}
  labels:
    {{- include "seqtoid-web.labels" $root | nindent 4 }}
    app.kubernetes.io/component: worker
    seqtoid.io/worker: {{ $name }}
spec:
  # `suspend` (cost spin-down) forces every worker to 0 replicas.
  replicas: {{ if $root.Values.suspend }}0{{ else }}{{ default 1 $w.replicaCount }}{{ end }}
  # Workers are singletons per queue-set; don't run two old+new during a roll.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "seqtoid-web.name" $root }}
      app.kubernetes.io/instance: {{ $root.Release.Name }}
      app.kubernetes.io/component: worker
      seqtoid.io/worker: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "seqtoid-web.name" $root }}
        app.kubernetes.io/instance: {{ $root.Release.Name }}
        app.kubernetes.io/component: worker
        seqtoid.io/worker: {{ $name }}
    spec:
      serviceAccountName: {{ include "seqtoid-web.serviceAccountName" $root }}
      # Resilience (#467a): worker drain. Prefer a per-worker override, then the
      # worker-wide workerDrain default (longer than web's, so a long-running in-flight
      # job finishes on SIGTERM before SIGKILL), falling back to the web grace period.
      terminationGracePeriodSeconds: {{ $w.terminationGracePeriodSeconds | default $root.Values.workerDrain.terminationGracePeriodSeconds | default $root.Values.gracefulDrain.terminationGracePeriodSeconds }}
      {{- with $root.Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: "{{ $root.Values.image.repository }}:{{ $root.Values.image.tag }}"
          imagePullPolicy: {{ $root.Values.image.pullPolicy }}
          args:
            {{- toYaml $w.args | nindent 12 }}
          env:
            {{- include "seqtoid-web.commonEnv" $root | nindent 12 }}
            - name: COUNT
              value: "1"
            {{- with $w.queue }}
            - name: QUEUE
              value: {{ . | quote }}
            {{- end }}
            {{- if $w.samplesBucket }}
            {{- $bucket := include "seqtoid-web.samplesBucket" $root }}
            {{- with $bucket }}
            - name: SAMPLES_BUCKET_NAME
              value: {{ . | quote }}
            {{- end }}
            {{- end }}
          {{- /*
            Resilience (#467a): workers have no HTTP port, so a wedged worker was
            previously never detected/restarted. Add an exec liveness probe that
            confirms the worker's own process tree is alive (pgrep the args' command
            word), so a crashed/hung supervisor gets the pod restarted. Per-worker
            override via workers.<name>.livenessProbe; default is a process check on
            the first arg (rake / shoryuken). Opt out with livenessProbe: null.
          */}}
          {{- $probeCmd := first $w.args }}
          {{- if hasKey $w "livenessProbe" }}
          {{- with $w.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- else if $root.Values.workerLivenessProbe.enabled }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - {{ printf "pgrep -f %s > /dev/null" $probeCmd | quote }}
            initialDelaySeconds: {{ $root.Values.workerLivenessProbe.initialDelaySeconds }}
            periodSeconds: {{ $root.Values.workerLivenessProbe.periodSeconds }}
            timeoutSeconds: {{ $root.Values.workerLivenessProbe.timeoutSeconds }}
            failureThreshold: {{ $root.Values.workerLivenessProbe.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml (default $root.Values.resources $w.resources) | nindent 12 }}
{{- end }}
{{- end }}
