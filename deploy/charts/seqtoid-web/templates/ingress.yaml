{{- if .Values.ingress.enabled -}}
# Public edge via the AWS Load Balancer Controller (ALB), routed to the ACTIVE
# service so a blueGreen promotion swaps traffic atomically. TLS terminates at the
# ALB using the per-env ACM cert; subnets/extra tuning arrive via ingress.annotations.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "seqtoid-web.fullname" . }}
  labels:
    {{- include "seqtoid-web.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/healthcheck-path: {{ .Values.ingress.healthCheckPath | quote }}
    {{- with .Values.ingress.certificateArn }}
    alb.ingress.kubernetes.io/certificate-arn: {{ . | quote }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "seqtoid-web.fullname" . }}-active
                port:
                  number: {{ .Values.service.port }}
{{- end }}
