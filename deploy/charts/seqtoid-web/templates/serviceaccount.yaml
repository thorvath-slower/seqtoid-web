{{- if .Values.serviceAccount.create -}}
# App IRSA identity — replaces the ECS web task role. The role (roleArn) grants
# SSM (Chamber), S3, SQS, etc.; wired per-env from the infra repo.
#
# Normal sync-wave resource, NOT a hook (#481): a PreSync-hooked SA got deleted
# between syncs (default hook-delete-policy BeforeHookCreation reaps a hook right
# before the next sync recreates it), which broke every pod that runs as it —
# "serviceaccount not found". As a plain tracked resource it is created once, never
# torn down between syncs, and re-applies idempotently. Do NOT re-add the argocd
# hook annotation here.
#
# sync-wave -5 orders it first WITHIN the Sync phase, so it lands before the app
# pods/Rollout that assume this identity exists. (Argo phase > wave: PreSync hooks
# still run before the Sync phase, so on a brand-new namespace's very first sync
# the migrate PreSync Job can precede this SA. The migrate Job tolerates that via
# its backoffLimit retry, and every steady-state resync has the SA already present.)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "seqtoid-web.serviceAccountName" . }}
  labels:
    {{- include "seqtoid-web.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
    {{- with .Values.serviceAccount.roleArn }}
    eks.amazonaws.com/role-arn: {{ . | quote }}
    {{- end }}
{{- end }}
