{{- if .Values.serviceAccount.create -}}
# App IRSA identity — replaces the ECS web task role. The role (roleArn) grants
# SSM (Chamber), S3, SQS, etc.; wired per-env from the infra repo.
#
# PreSync hook (sync-wave -1): the migrate Job is a PreSync hook that runs as this
# ServiceAccount, so the SA must exist BEFORE the PreSync phase — a plain Sync-phase
# SA is created too late ("serviceaccount not found"). A SA re-applies idempotently,
# so no hook-delete-policy is needed (unlike the immutable migrate Job).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "seqtoid-web.serviceAccountName" . }}
  labels:
    {{- include "seqtoid-web.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "-1"
    {{- with .Values.serviceAccount.roleArn }}
    eks.amazonaws.com/role-arn: {{ . | quote }}
    {{- end }}
{{- end }}
