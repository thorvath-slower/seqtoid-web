{{- if and .Values.taxonRefresh.enabled (not .Values.suspend) -}}
# Scheduled taxon-lineage refresh — ticket #484.
# The taxon-lineage -> OpenSearch load runs at deploy time via the PreSync-hook
# Job (taxon-load-job.yaml, #471). Between deploys the data can drift, so this
# standing CronJob re-runs the SAME idempotent load path on a cadence to keep the
# index converged with the DB.
#
# Cheap by construction (#476 guard, PR #124): the invoked rake task
# (taxon_lineage_slice:load_slice_if_needed) skips (no-op) when the index doc-count
# is already in sync with the DB, and only does real work when there's a newer
# slice to load. We reuse the SAME image/command/SA/nodeSelector/env/resources as
# the deploy-time Job so behavior is identical — no new load logic is invented here.
#
# This is NOT an Argo hook: it's a standing scheduled resource (no
# argocd.argoproj.io/hook annotation), so Argo manages it like any other manifest.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "seqtoid-web.fullname" . }}-taxon-refresh
  labels:
    {{- include "seqtoid-web.labels" . | nindent 4 }}
    app.kubernetes.io/component: taxon-refresh
spec:
  schedule: {{ .Values.taxonRefresh.schedule | quote }}
  # Never overlap runs: the load is single-shot and a second concurrent run would
  # race the same ES index. If a run is still going when the next tick fires, skip.
  concurrencyPolicy: {{ .Values.taxonRefresh.concurrencyPolicy }}
  # If the controller misses a scheduled time (e.g. node churn), only start late
  # within this window; past it, skip the missed run rather than pile up backlog.
  startingDeadlineSeconds: {{ .Values.taxonRefresh.startingDeadlineSeconds }}
  successfulJobsHistoryLimit: {{ .Values.taxonRefresh.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.taxonRefresh.failedJobsHistoryLimit }}
  jobTemplate:
    metadata:
      labels:
        {{- include "seqtoid-web.labels" . | nindent 8 }}
        app.kubernetes.io/component: taxon-refresh
    spec:
      backoffLimit: {{ .Values.taxonRefresh.backoffLimit }}
      # Bound each run so a stuck import can't wedge the next scheduled tick.
      activeDeadlineSeconds: {{ .Values.taxonRefresh.activeDeadlineSeconds }}
      # Reap finished Jobs so history doesn't accumulate beyond the limits above.
      ttlSecondsAfterFinished: {{ .Values.taxonRefresh.ttlSecondsAfterFinished }}
      template:
        metadata:
          labels:
            {{- include "seqtoid-web.labels" . | nindent 12 }}
            app.kubernetes.io/component: taxon-refresh
        spec:
          restartPolicy: Never
          serviceAccountName: {{ include "seqtoid-web.serviceAccountName" . }}
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: taxon-refresh
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              args:
                {{- toYaml .Values.taxonRefresh.command | nindent 16 }}
              env:
                {{- include "seqtoid-web.commonEnv" . | nindent 16 }}
              resources:
                {{- toYaml .Values.taxonRefresh.resources | nindent 16 }}
{{- end }}
