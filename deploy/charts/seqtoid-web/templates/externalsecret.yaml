{{- if .Values.secrets.externalSecrets.enabled }}
# Syncs the Chamber SSM Parameter Store secrets (/idseq-<env>-web/) into a K8s Secret via ESO, using the
# seqtoid-web ServiceAccount's IRSA role (already has the SSM access Chamber relies on). CZID-325.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ include "seqtoid-web.fullname" . }}
  labels:
    {{- include "seqtoid-web.labels" . | nindent 4 }}
spec:
  provider:
    aws:
      service: ParameterStore
      region: {{ .Values.awsRegion }}
      auth:
        jwt:
          serviceAccountRef:
            name: {{ include "seqtoid-web.serviceAccountName" . }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "seqtoid-web.fullname" . }}
  labels:
    {{- include "seqtoid-web.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.secrets.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ include "seqtoid-web.fullname" . }}
    kind: SecretStore
  target:
    name: {{ include "seqtoid-web.fullname" . }}-env
    creationPolicy: Owner
  dataFrom:
    - find:
        path: {{ .Values.secrets.parameterPath | default (printf "/idseq-%s-web/" .Values.environment) | quote }}
{{- end }}
