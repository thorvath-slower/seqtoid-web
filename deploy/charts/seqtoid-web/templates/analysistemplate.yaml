{{- /* CZID-12: an Argo AnalysisTemplate — only with blue/green (managed-SaaS/EKS). */}}
{{- if and .Values.blueGreen.enabled .Values.blueGreen.analysis.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: {{ include "seqtoid-web.fullname" . }}-smoke
  labels:
    {{- include "seqtoid-web.labels" . | nindent 4 }}
spec:
  # Pre-promotion gate: curl the PREVIEW service's /health_check once; non-200 fails the promotion.
  # Bucket B (CZID-326): replace/augment with Prometheus-backed metrics once observability lands.
  metrics:
    - name: smoke
      count: 1
      failureLimit: 0
      provider:
        job:
          spec:
            backoffLimit: 1
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: smoke
                    image: curlimages/curl:8.10.1
                    command: ["sh", "-c"]
                    args:
                      - 'curl -fsS --max-time 10 http://{{ include "seqtoid-web.fullname" . }}-preview/health_check'
{{- end }}
