{{- if .Values.preview.enabled -}}
{{- $src := .Values.preview.srcChamberService | default (printf "idseq-%s-web" .Values.environment) -}}
# Per-PR sandbox PROVISION Job (#616). PreSync hook at sync-wave -10 -- runs after the
# provisioner SA (-20) and BEFORE the migrate hook (0), so the isolated schema exists
# before `db:migrate` runs against it (via DB_NAME).
#
# Runs `rake sandbox:provision` as the elevated provisioner SA, with CHAMBER_SERVICE
# pointed at the SOURCE service (idseq-<env>-web) -- NOT the sandbox path -- so the
# entrypoint's `chamber exec` injects the master DB creds + shared config the task needs
# to create the schema/user and seed the sandbox SSM path. Deliberately does NOT use
# commonEnv (which carries the app's sandbox CHAMBER_SERVICE/DB_NAME extraEnv).
#
# hook-delete-policy BeforeHookCreation only (mirrors migrate #481): an in-flight
# provision is never killed by an overlapping sync; the task is idempotent on retry.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "seqtoid-web.fullname" . }}-sandbox-provision
  labels:
    {{- include "seqtoid-web.labels" . | nindent 4 }}
    app.kubernetes.io/component: sandbox-provision
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-10"
spec:
  backoffLimit: {{ .Values.preview.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.preview.activeDeadlineSeconds }}
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      annotations:
        # Karpenter must not evict this Job mid-run during node consolidation.
        karpenter.sh/do-not-disrupt: "true"
      labels:
        {{- include "seqtoid-web.labels" . | nindent 8 }}
        app.kubernetes.io/component: sandbox-provision
    spec:
      restartPolicy: Never
      serviceAccountName: {{ .Values.preview.provisioner.serviceAccountName }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: sandbox-provision
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["rake", "sandbox:provision"]
          env:
            - name: RAILS_ENV
              value: development
            - name: ENVIRONMENT
              value: {{ .Values.environment | quote }}
            - name: RAILS_LOG_TO_STDOUT
              value: "yes"
            - name: AWS_REGION
              value: {{ .Values.aws.region | quote }}
            - name: AWS_DEFAULT_REGION
              value: {{ .Values.aws.region | quote }}
            # Source config (master creds + shared secrets) -- NOT the sandbox path.
            - name: CHAMBER_SERVICE
              value: {{ $src | quote }}
            - name: SANDBOX_SRC_CHAMBER_SERVICE
              value: {{ $src | quote }}
            - name: SANDBOX_PR_NUMBER
              value: {{ .Values.preview.prNumber | quote }}
          resources:
            {{- toYaml .Values.preview.resources | nindent 12 }}
{{- end }}
