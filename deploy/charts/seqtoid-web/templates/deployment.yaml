{{- /* CZID-12: plain Deployment for the self-hosted (k3s) profile, where the Argo Rollouts CRD is
       absent. Rendered ONLY when blueGreen.enabled=false; managed-SaaS/EKS uses templates/rollout.yaml.
       The pod spec mirrors rollout.yaml — keep the two in sync (a shared helper is a future refactor). */}}
{{- if not .Values.blueGreen.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "seqtoid-web.fullname" . }}
  labels:
    {{- include "seqtoid-web.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "seqtoid-web.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "seqtoid-web.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      serviceAccountName: {{ include "seqtoid-web.serviceAccountName" . }}
      containers:
        - name: web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: {{ .Values.command | toJson }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
          env:
            {{- include "seqtoid-web.commonEnv" . | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health_check
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health_check
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
{{- end }}
