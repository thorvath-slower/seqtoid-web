{{- if .Values.preview.enabled -}}
# Elevated, HOOK-ONLY ServiceAccount for the per-PR sandbox provision/teardown Jobs
# (#616). Bound to the seqtoid-web-preview-provisioner IRSA role, which can read dev's
# SSM + write the sandbox SSM path -- access the app pods (seqtoid-web SA) deliberately
# do NOT have. Only the provision (PreSync) + teardown (PostDelete) hook Jobs run as it.
#
# Declared as a hook for BOTH PreSync and PostDelete so it exists whenever either Job
# runs, at a very low sync-wave so it precedes the Jobs within each phase. Unlike the
# app SA (a tracked resource, so long-running pods never lose it), this SA is used only
# by ephemeral hook Jobs, so a hook lifecycle is correct here.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.preview.provisioner.serviceAccountName }}
  labels:
    {{- include "seqtoid-web.labels" . | nindent 4 }}
    app.kubernetes.io/component: sandbox-provisioner
  annotations:
    argocd.argoproj.io/hook: PreSync,PostDelete
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-20"
    {{- with .Values.preview.provisioner.roleArn }}
    eks.amazonaws.com/role-arn: {{ . | quote }}
    {{- end }}
{{- end }}
