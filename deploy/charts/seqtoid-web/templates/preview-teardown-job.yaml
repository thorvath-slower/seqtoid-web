{{- if .Values.preview.enabled -}}
# Per-PR sandbox TEARDOWN Job (#616). PostDelete hook -- runs when the preview
# Application is deleted (the ApplicationSet reaps it on PR close), and drops the
# schema + scoped user and deletes the sandbox SSM path.
#
# Runs `rake sandbox:teardown` as the same elevated provisioner SA, with CHAMBER_SERVICE
# pointed at the SOURCE service so it has the master DB creds (to DROP) + the provisioner
# role's SSM access (to delete the sandbox path). The task is idempotent -- safe if the
# schema/user/params are already gone.
{{- $src := .Values.preview.srcChamberService | default (printf "idseq-%s-web" .Values.environment) -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "seqtoid-web.fullname" . }}-sandbox-teardown
  labels:
    {{- include "seqtoid-web.labels" . | nindent 4 }}
    app.kubernetes.io/component: sandbox-teardown
  annotations:
    argocd.argoproj.io/hook: PostDelete
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: {{ .Values.preview.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.preview.activeDeadlineSeconds }}
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        {{- include "seqtoid-web.labels" . | nindent 8 }}
        app.kubernetes.io/component: sandbox-teardown
    spec:
      restartPolicy: Never
      serviceAccountName: {{ .Values.preview.provisioner.serviceAccountName }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: sandbox-teardown
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["rake", "sandbox:teardown"]
          env:
            - name: RAILS_ENV
              value: development
            - name: ENVIRONMENT
              value: {{ .Values.environment | quote }}
            - name: RAILS_LOG_TO_STDOUT
              value: "yes"
            - name: AWS_REGION
              value: {{ .Values.aws.region | quote }}
            - name: AWS_DEFAULT_REGION
              value: {{ .Values.aws.region | quote }}
            - name: CHAMBER_SERVICE
              value: {{ $src | quote }}
            - name: SANDBOX_SRC_CHAMBER_SERVICE
              value: {{ $src | quote }}
            - name: SANDBOX_PR_NUMBER
              value: {{ .Values.preview.prNumber | quote }}
          resources:
            {{- toYaml .Values.preview.resources | nindent 12 }}
{{- end }}
