default: &default
  adapter: mysql2
  username: <%= ENV['DB_USERNAME'] || 'root' %>
  password: <%= ENV['DB_PASSWORD'] %>
  host: <%= ENV['RDS_ADDRESS'] || ENV['DB_HOST'] || '127.0.0.1' %>
  port: <%= ENV['DB_PORT'] || 3306 %>
  database: idseq_<%= Rails.env %>
  encoding: utf8mb4
  collation: utf8mb4_unicode_ci
  pool: <%= ENV['DB_CONNECTION_POOL'] || 5 %>

deployed: &deployed
  <<: *default
  host: <%= ENV['RDS_ADDRESS'] %>

development:
  <<: *default
  database: idseq_dev

prod:
  <<: *deployed
staging:
  <<: *deployed
sandbox:
  <<: *deployed
test:
  <<: *default
  database: idseq_test
