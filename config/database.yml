default: &default
  adapter: mysql2
  username: root
  host: 127.0.0.1
  port: 3306
  database: idseq_<%= Rails.env %>
  encoding: utf8
  collation: utf8_unicode_ci
  reconnect: true
  pool: <%= ENV['DB_CONNECTION_POOL'] || 5 %>
  ssl_mode: 'REQUIRED'

test:
  <<: *default
  # Use 127.0.0.1 for host-to-container OR the service name for container-to-container
  #host: 127.0.0.1
  host: <%= ENV['DB_HOST'] || "db" %>
  database: idseq_test
  #adapter: mysql2
  #encoding: utf8mb4
  #username: root
  #password: pw
  #port: 3306

deployed: &deployed
  <<: *default
  host: <%= ENV['RDS_ADDRESS'] %>
  password: <%= ENV['DB_PASSWORD'] %>
  port: <%= ENV['DB_PORT'] %>
  username: <%= ENV['DB_USERNAME'] %>

development:
  <<: *deployed
  database: idseq_dev

prod:
  <<: *deployed

staging:
  <<: *deployed

sandbox:
  <<: *deployed
