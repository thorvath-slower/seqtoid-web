default: &default
  adapter: postgresql
  username: <%= ENV['DB_USERNAME'] || 'postgres' %>
  password: <%= ENV['DB_PASSWORD'] %>
  host: <%= ENV['DB_HOST'] || '127.0.0.1' %>
  port: <%= ENV['DB_PORT'] || 5432 %>
  database: idseq_<%= Rails.env %>
  encoding: unicode
  pool: <%= ENV['DB_CONNECTION_POOL'] || 5 %>

deployed: &deployed
  <<: *default
  host: <%= ENV['RDS_ADDRESS'] %>
  # RDS / CloudNativePG require TLS in transit (Constitution Principle VII).
  sslmode: <%= ENV['DB_SSLMODE'] || 'require' %>

development:
  <<: *deployed
  database: idseq_dev

prod:
  <<: *deployed

staging:
  <<: *deployed

sandbox:
  <<: *deployed

# TODO: Renamed db to local_db to try and avoid weird "Database 'db' does not exist" errors when running the rails db:create task in a remote/AWS DB
test:
  <<: *default
  host: <%= ENV['DB_HOST'] || "local_db" %>
  database: idseq_test
