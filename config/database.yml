default: &default
  adapter: mysql2
  username: <%= ENV['DB_USERNAME'] || 'root' %>
  password: <%= ENV['DB_PASSWORD'] %>
  host: <%= ENV['RDS_ADDRESS'] || ENV['DB_HOST'] || '127.0.0.1' %>
  port: <%= ENV['DB_PORT'] || 3306 %>
  database: idseq_<%= Rails.env %>
  encoding: utf8mb4
  collation: utf8mb4_unicode_ci
  pool: <%= ENV['DB_CONNECTION_POOL'] || 5 %>

deployed: &deployed
  <<: *default
  host: <%= ENV['RDS_ADDRESS'] %>

development:
  <<: *default
  # idseq_dev matches the dev RDS (not idseq_development). DB_NAME lets a per-PR preview
  # sandbox (which runs as RAILS_ENV=development) point at its OWN schema on the shared dev
  # Aurora, e.g. idseq_pr_N. Unset -> idseq_dev, byte-identical to today.
  database: <%= ENV['DB_NAME'] || 'idseq_dev' %>

prod:
  <<: *deployed
staging:
  <<: *deployed
sandbox:
  <<: *deployed
test:
  <<: *default
  # parallel_tests gives each worker its own DB via TEST_ENV_NUMBER (empty for
  # process 1, "2","3",… for the rest) so N processes share the one MySQL container
  # without stepping on each other. Serial runs (no TEST_ENV_NUMBER) stay idseq_test.
  database: idseq_test<%= ENV['TEST_ENV_NUMBER'] %>
